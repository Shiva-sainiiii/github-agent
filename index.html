<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>GitHub Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --red:       #f85149;
      --yellow:    #d29922;
      --purple:    #bc8cff;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Inter', sans-serif;
      --radius:    10px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 15px;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 10px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .header-title {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .header-sub {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .status-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── CONTEXT PILLS ── */
    #context-bar {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    #context-bar::-webkit-scrollbar { display: none; }
    #context-bar:empty { display: none; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--accent);
      white-space: nowrap;
      cursor: default;
    }

    .pill.repo { border-color: var(--accent); }

    /* ── QUICK ACTIONS ── */
    #quick-actions {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    #quick-actions::-webkit-scrollbar { display: none; }

    .qa-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .qa-btn:active {
      background: var(--surface);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.agent { align-items: flex-start; }

    .msg-label {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
      padding: 0 4px;
    }

    .msg-bubble {
      max-width: 88%;
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg-wrap.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .msg-wrap.agent .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    /* Action-colored borders */
    .msg-bubble.success  { border-color: var(--green); }
    .msg-bubble.error    { border-color: var(--red); }
    .msg-bubble.warning  { border-color: var(--yellow); }
    .msg-bubble.info     { border-color: var(--accent); }

    /* Markdown-ish rendering */
    .msg-bubble strong { font-weight: 600; color: var(--accent); }
    .msg-bubble code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--surface2);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--green);
    }
    .msg-bubble pre {
      margin-top: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      overflow-x: auto;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text);
      white-space: pre-wrap;
    }
    .msg-bubble a {
      color: var(--accent);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .msg-bubble a:hover { text-decoration: underline; }

    /* ── TYPING ── */
    #typing-indicator {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 0 4px;
    }
    #typing-indicator.show { display: flex; }

    .typing-label {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    .typing-dots {
      display: flex; gap: 4px;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    /* ── INPUT AREA ── */
    #input-area {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #userInput {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }
    #userInput:focus { border-color: var(--accent); }
    #userInput::placeholder { color: var(--muted); }

    #sendBtn {
      width: 44px; height: 44px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #sendBtn:active { opacity: 0.8; transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #sendBtn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── EMPTY STATE ── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    #empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 4px;
    }

    #empty-state h2 {
      font-family: var(--font-mono);
      font-size: 16px;
      color: var(--text);
      font-weight: 600;
    }

    #empty-state p { max-width: 280px; line-height: 1.6; }

    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 4px;
    }

    .chip {
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .chip:active {
      background: var(--surface2);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo">⚡</div>
      <div>
        <div class="header-title">GitHub Agent</div>
        <div class="header-sub" id="username-label">Connecting...</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:11px;font-family:var(--font-mono);color:var(--muted)">AI Online</span>
      <div class="status-dot"></div>
    </div>
  </header>

  <!-- CONTEXT BAR -->
  <div id="context-bar"></div>

  <!-- QUICK ACTIONS -->
  <div id="quick-actions">
    <button class="qa-btn" onclick="quickAction('Mere saare repos list kar')">📁 List Repos</button>
    <button class="qa-btn" onclick="quickAction('Ek naya repo bana')">➕ New Repo</button>
    <button class="qa-btn" onclick="quickAction('Last repo me index.html file bana ek basic HTML page')">📄 New File</button>
    <button class="qa-btn" onclick="quickAction('Current active repo ki sari files dikha')">🔍 List Files</button>
    <button class="qa-btn" onclick="clearChat()">🗑️ Clear</button>
  </div>

  <!-- MESSAGES -->
  <div id="messages">
    <div id="empty-state">
      <div class="empty-icon">🤖</div>
      <h2>GitHub Agent Ready</h2>
      <p>Repos banana, files likhna, code edit karna — sab bol bas.</p>
      <div class="example-chips">
        <div class="chip" onclick="fillInput('calculator-app repo bana')">calculator-app repo bana</div>
        <div class="chip" onclick="fillInput('my-portfolio me index.html bana')">portfolio me index.html bana</div>
        <div class="chip" onclick="fillInput('Saare repos dikha')">Saare repos dikha</div>
        <div class="chip" onclick="fillInput('test-repo ko delete kar')">test-repo delete kar</div>
      </div>
    </div>
    <div id="typing-indicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      <span class="typing-label">Agent soch raha hai...</span>
    </div>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <div class="input-row">
      <textarea id="userInput"
        placeholder="Bol bhai... 'portfolio repo bana aur index.html add kar'"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="sendBtn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
// ── STATE ──
const history = [];  // [{role, content}]
let activeRepo = null;
let isLoading = false;

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  const label = document.getElementById('username-label');
  // Fetch username from backend
  fetch('/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ message: 'SYSTEM_PING', history: [] })
  }).catch(() => {});
  label.textContent = 'GitHub Agent v2';
});

// ── TEXTAREA AUTO RESIZE ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── KEY HANDLER ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

// ── QUICK ACTIONS ──
function quickAction(text) {
  document.getElementById('userInput').value = text;
  sendMsg();
}

function fillInput(text) {
  const input = document.getElementById('userInput');
  input.value = text;
  input.focus();
  autoResize(input);
}

// ── CLEAR ──
function clearChat() {
  history.length = 0;
  activeRepo = null;
  document.getElementById('messages').innerHTML = `
    <div id="empty-state">
      <div class="empty-icon">🤖</div>
      <h2>GitHub Agent Ready</h2>
      <p>Repos banana, files likhna, code edit karna — sab bol bas.</p>
      <div class="example-chips">
        <div class="chip" onclick="fillInput('calculator-app repo bana')">calculator-app repo bana</div>
        <div class="chip" onclick="fillInput('my-portfolio me index.html bana')">portfolio me index.html bana</div>
        <div class="chip" onclick="fillInput('Saare repos dikha')">Saare repos dikha</div>
        <div class="chip" onclick="fillInput('test-repo ko delete kar')">test-repo delete kar</div>
      </div>
    </div>
    <div id="typing-indicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span class="typing-label">Agent soch raha hai...</span>
    </div>`;
  updateContextBar();
}

// ── CONTEXT BAR ──
function updateContextBar() {
  const bar = document.getElementById('context-bar');
  bar.innerHTML = '';
  if (activeRepo) {
    bar.innerHTML = `<div class="pill repo">📁 ${activeRepo}</div>`;
  }
  if (history.length > 0) {
    bar.innerHTML += `<div class="pill">💬 ${Math.ceil(history.length / 2)} messages</div>`;
  }
}

// ── MARKDOWN RENDERER (lightweight) ──
function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```([\s\S]*?)```/g, (_, code) =>
    `<pre>${escHtml(code.trim())}</pre>`);
  // Inline code
  text = text.replace(/`([^`]+)`/g, (_, code) =>
    `<code>${escHtml(code)}</code>`);
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Links
  text = text.replace(/(https?:\/\/[^\s<]+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>');
  // Line breaks
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── ADD MESSAGE ──
function addMessage(role, content, actionClass = '') {
  // Remove empty state
  const es = document.getElementById('empty-state');
  if (es) es.remove();

  const messages = document.getElementById('messages');
  const typing   = document.getElementById('typing-indicator');

  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : '⚡ Agent';

  const bubble = document.createElement('div');
  bubble.className = `msg-bubble ${actionClass}`;
  bubble.innerHTML = role === 'user' ? escHtml(content) : renderMarkdown(content);

  wrap.appendChild(label);
  wrap.appendChild(bubble);

  // Insert before typing indicator
  messages.insertBefore(wrap, typing);
  messages.scrollTop = messages.scrollHeight;
}

// ── SEND ──
async function sendMsg() {
  if (isLoading) return;

  const input = document.getElementById('userInput');
  const msg   = input.value.trim();
  if (!msg) return;

  isLoading = true;
  input.value = '';
  autoResize(input);
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', msg);
  history.push({ role: 'user', content: msg });

  // Show typing
  const typing = document.getElementById('typing-indicator');
  typing.classList.add('show');
  document.getElementById('messages').scrollTop = 9999;

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: history.slice(0, -1) })
    });

    const data = await res.json();
    typing.classList.remove('show');

    // Determine bubble color class
    const actionColors = {
      create_repo: 'success', delete_repo: 'success',
      create_file: 'success', update_file: 'success', delete_file: 'success',
      list_repos: 'info', list_files: 'info', read_file: 'info',
      error: 'error', warning: 'warning', message: ''
    };
    const cls = actionColors[data.action] || '';

    addMessage('agent', data.reply, cls);
    history.push({ role: 'assistant', content: data.reply });

    // Update context
    if (data.repo) activeRepo = data.repo;
    if (data.action === 'delete_repo') activeRepo = null;
    updateContextBar();

  } catch (err) {
    typing.classList.remove('show');
    addMessage('agent', '❌ Server se connect nahi ho paya. Page refresh karo.', 'error');
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
